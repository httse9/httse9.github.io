<!DOCTYPE html>
<html lang="en-us">

<head>
    <meta charset="UTF-8">
    <title>testing - Blogs</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <h1>Blog</h1>

    <p id="content">Content</p>


</body>

<script src="jquery.js"></script>
<script>
    $().ready(function(){
        $.getJSON("./data.json", function(data){
            console.log(data);
            const c = document.getElementById("content");
            c.innerHTML = data;
        });
       $.get("blogs.php", function(data){
            console.log(data);
       });
       $.ajax({
        type: "GET",
        url: "blogs.php",
        dataType: "text",
       })
       .done(function (data){
        console,log(data);
       });
    });
</script>

</html>
