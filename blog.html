<!DOCTYPE html>
<html lang="en-us">

<head>
    <meta charset="UTF-8">
    <title>testing - blog</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <h1>Blog</h1>

    <p id="content">Content</p>


</body>

<script src="jquery.js"></script>
<script>
    const urlParams = new URLSearchParams(window.location.search);
    var title = urlParams.get("title")
    console.log(title);
    document.getElementById("content").innerHTML = title;

    $.ajax({
        url: "https://api.github.com/repos/httse9/httse9.github.io/contents/blogs/trash.txt",
        dataType: "text",
        success: function(results){
            console.log(results)
            console.log(results.data)
        }
    })
    $.ajax({
        url: "./blogs/trash.txt",
        dataType: "text",
        success: function(results){
            console.log(results)
            document.getElementById("content").innerHTML = results
        }
    })
</script>

</html>
